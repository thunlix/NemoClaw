version: "0.1.0"
min_openshell_version: "0.1.0"
min_openclaw_version: "2026.3.0"
digest: ""  # Computed at release time

profiles:
  - default
  - ncp
  - nim-local
  - vllm

description: |
  NemoClaw blueprint: orchestrates OpenClaw sandbox creation, migration,
  and NIM/vLLM inference routing inside OpenShell.

components:
  sandbox:
    image: "openshell-sandbox:local"
    name: "openclaw"
    forward_ports:
      - 18789

  inference:
    profiles:
      default:
        provider_type: "openai"
        provider_name: "ollama-local"
        endpoint: "http://localhost:11434/v1"
        model: "qwen2.5-coder:32b"
        credential_env: "OPENAI_API_KEY"
        credential_default: "ollama"

      ncp:
        provider_type: "nvidia"
        provider_name: "nvidia-ncp"
        endpoint: ""
        model: "nvidia/nemotron-3-super-120b-a12b"
        credential_env: "NVIDIA_API_KEY"
        dynamic_endpoint: true

      nim-local:
        provider_type: "openai"
        provider_name: "nim-local"
        endpoint: "http://nim-service.local:8000/v1"
        model: "nvidia/nemotron-3-super-120b-a12b"
        credential_env: "NIM_API_KEY"

      vllm:
        provider_type: "openai"
        provider_name: "vllm-local"
        endpoint: "http://localhost:8000/v1"
        model: "nvidia/nemotron-3-nano-30b-a3b"
        credential_env: "OPENAI_API_KEY"
        credential_default: "dummy"

  tether:
    # Behavioral drift enforcement via Tether.
    # When enabled, the sandbox supervisor reports all proxy activity to Tether
    # and enforces verdicts (continue/caution/halt).
    enabled: true
    endpoint: "http://192.168.42.200:3002"
    mode: monitor    # "monitor" (log only) or "enforce" (halt on high drift)
    agent_id: "nemoclaw-agent"
    intent:
      goal: "Help user with code analysis, development, and project management"
      constraints:
        - "Only access APIs approved in the sandbox network policy"
        - "Do not exfiltrate repository data to unauthorized endpoints"
        - "Do not modify infrastructure or deployment configurations without approval"
      expected_outputs:
        - "Code changes and pull requests"
        - "Analysis reports and summaries"
        - "Documentation updates"
      drift_policy:
        mode: block
        threshold: 0.7

  policy:
    base: "sandboxes/openclaw/policy.yaml"
    additions:
      nim_service:
        name: nim_service
        endpoints:
          - host: "nim-service.local"
            port: 8000
            protocol: rest
