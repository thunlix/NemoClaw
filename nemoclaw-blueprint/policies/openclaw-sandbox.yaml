#
# Strict baseline policy for the OpenClaw sandbox.
# Principle: deny by default, allow only what's needed for core functionality.
# Dynamic updates (network_policies, inference) can be applied post-creation
# via `openshell policy set`. Static fields are effectively creation-locked.
#
# Policy tiers (future):
#   strict  — this file. Minimum for onboard + basic agent operation.
#   relaxed — adds third-party model providers, broader web access.
#
# To add endpoints: update this file and re-run `openclaw nemoclaw migrate`
# or apply dynamically via `openshell policy set`.

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
  read_write:
    - /sandbox
    - /tmp
    - /dev/null

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  claude_code:
    name: claude_code
    endpoints:
      - host: api.anthropic.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/**" }
      - host: statsig.anthropic.com
        port: 443
        rules:
          - allow: { method: "*", path: "/**" }
      - host: sentry.io
        port: 443
        rules:
          - allow: { method: "*", path: "/**" }
    binaries:
      - { path: /usr/local/bin/claude }

  nvidia:
    name: nvidia
    endpoints:
      - host: integrate.api.nvidia.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/**" }
      - host: inference-api.nvidia.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/**" }
    binaries:
      - { path: /usr/local/bin/claude }
      - { path: /usr/local/bin/openclaw }

  ollama:
    name: ollama
    endpoints:
      - host: "127.0.0.1"
        port: 11434
        protocol: rest
        enforcement: enforce
        tls: passthrough
        rules:
          - allow: { method: "*", path: "/**" }
    binaries: []

  github:
    name: github
    endpoints:
      - host: github.com
        port: 443
        access: full
      - host: api.github.com
        port: 443
        access: full
    binaries:
      - { path: /usr/bin/gh }
      - { path: /usr/bin/git }

  # ── OpenClaw "phone home" ────────────────────────────────────────────
  # Minimum viable set for OpenClaw to authenticate, discover plugins,
  # and reach ClawHub. Binary-restricted to openclaw only.
  # Docs access is read-only (GET). ClawHub and openclaw.ai are
  # restricted to GET+POST (auth flows, plugin discovery).

  clawhub:
    name: clawhub
    endpoints:
      - host: clawhub.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/local/bin/openclaw }

  openclaw_api:
    name: openclaw_api
    endpoints:
      - host: openclaw.ai
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/local/bin/openclaw }

  openclaw_docs:
    name: openclaw_docs
    endpoints:
      - host: docs.openclaw.ai
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/local/bin/openclaw }

  # npm registry — needed for `openclaw plugins install` and `npm install`
  npm_registry:
    name: npm_registry
    endpoints:
      - host: registry.npmjs.org
        port: 443
        access: full
    binaries:
      - { path: /usr/local/bin/openclaw }
      - { path: /usr/local/bin/npm }

  # ── Messaging — pre-allowed for agent notifications ────────────
  # Telegram Bot API is open by default so the agent can send
  # notifications and respond to chats without triggering approval.
  telegram:
    name: telegram
    endpoints:
      - host: api.telegram.org
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/bot*/**" }
          - allow: { method: POST, path: "/bot*/**" }

  # ── Tether — agent intent commitment ──────────────────────────
  # Allows the agent to commit intent and pre-check actions against
  # Tether. Activity reporting endpoints are blocked — the sandbox
  # supervisor handles those from outside the sandbox.
  tether_intent:
    name: tether_intent
    endpoints:
      - host: "192.168.42.200"
        port: 3002
        protocol: rest
        enforcement: enforce
        tls: passthrough
        rules:
          - allow: { method: POST, path: "/api/intent/commit" }
          - allow: { method: POST, path: "/api/intent/stake-floor" }
          - allow: { method: POST, path: "/api/action/check" }
          - allow: { method: POST, path: "/api/agents/register" }
    binaries: []

# ── Tether integration ──────────────────────────────────────────
# Behavioral drift enforcement via Tether. The sandbox supervisor
# reports ground-truth proxy activity to Tether and enforces verdicts.
# Set enabled: false or remove this section to disable.
tether:
  enabled: true
  endpoint: "http://192.168.42.200:3002"
  task_id: ""           # Set by orchestrator before sandbox creation
  mode: monitor         # "monitor" (log only) or "enforce" (act on verdicts)
  report_interval: 30   # seconds between activity reports
